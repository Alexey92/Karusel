<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARUSEL — Публичный экран</title>
    <link rel="stylesheet" href="/static/public.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎰 KARUSEL 🎰</h1>
            <p class="subtitle">Сегодня выигрывают здесь!</p>
        </div>

        <!-- Экран 1: Выигрыши за 24 часа + последний выигрыш -->
        <div class="stats" id="screen-1">
            <div class="stat-card">
                <div class="stat-label">ВЫИГРЫШЕЙ ЗА 24 ЧАСА</div>
                <div class="stat-value" id="wins24h">—</div>
                <div class="stat-icon">🏆</div>
            </div>
            <div class="stat-card" id="last-win-card">
                <div class="stat-label">ПОСЛЕДНИЙ ПРИЗ</div>
                <div class="stat-time" id="lastWinTime">—</div>
                <div class="stat-detail" id="lastWinMachine">Ожидаем...</div>
                <div class="stat-icon">⏱️</div>
            </div>
        </div>

        <!-- Экран 2: Всего выигрышей -->
        <div class="stats" id="screen-2" style="display:none;">
            <div class="stat-card" style="min-width: 600px;">
                <div class="stat-label">ВСЕГО ВЫИГРЫШЕЙ</div>
                <div class="stat-value" id="totalWins">—</div>
                <div class="stat-icon">🎯</div>
            </div>
        </div>

        <!-- Экран 3: Осталось до главного приза -->
        <div class="stats" id="screen-3" style="display:none;">
            <div class="stat-card" style="min-width: 600px;">
                <div class="stat-label">ОСТАЛОСЬ ДО ГЛАВНОГО ПРИЗА</div>
                <div class="stat-value" id="jackpotRemaining">—</div>
                <div class="stat-detail" id="jackpotDetail"></div>
                <div class="stat-icon">🎁</div>
            </div>
        </div>

        <div class="footer"><p>Играйте и выигрывайте! ✨</p></div>
    </div>

    <script>
        const LOCATION_ID = new URLSearchParams(window.location.search).get('location_id') || '';
        let currentScreen = 1;

        async function fetchData() {
            try {
                const url = '/api/screen-data' + (LOCATION_ID ? '?location_id=' + LOCATION_ID : '');
                const response = await fetch(url);
                const data = await response.json();

                // Экран 1
                document.getElementById('wins24h').textContent = data.wins_24h;
                if (data.last_win) {
                    const timestamp = new Date(data.last_win.timestamp + 'Z');
                    const now = new Date();
                    const diffHours = (now - timestamp) / 1000 / 3600;

                    if (diffHours <= 2) {
                        const timeStr = timestamp.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
                        document.getElementById('lastWinTime').textContent = timeStr;
                        document.getElementById('lastWinMachine').textContent = data.last_win.machine_name + ' (' + data.last_win.location_name + ')';
                        document.getElementById('last-win-card').style.display = '';
                    } else {
                        document.getElementById('last-win-card').style.display = 'none';
                    }
                } else {
                    document.getElementById('lastWinTime').textContent = '—';
                    document.getElementById('lastWinMachine').textContent = 'Пока нет выигрышей';
                }

                // Экран 2
                document.getElementById('totalWins').textContent = data.total_wins;

                // Экран 3
                const remaining = (data.jackpot_threshold || 0) - (data.jackpot_current || 0);
                document.getElementById('jackpotRemaining').textContent = remaining > 0 ? remaining : 0;
                document.getElementById('jackpotDetail').textContent =
                    `${data.jackpot_current || 0} / ${data.jackpot_threshold || 0}`;

            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
            }
        }

        function switchScreen() {
            document.getElementById('screen-1').style.display = 'none';
            document.getElementById('screen-2').style.display = 'none';
            document.getElementById('screen-3').style.display = 'none';
            document.getElementById('screen-' + currentScreen).style.display = 'flex';
            currentScreen = currentScreen >= 3 ? 1 : currentScreen + 1;
        }

        fetchData();
        setInterval(fetchData, 1000);
        setInterval(switchScreen, 10000);  // Переключение экранов каждые 10 секунд
        switchScreen();
    </script>
</body>
</html>
