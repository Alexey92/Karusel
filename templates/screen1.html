<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARUSEL — Экран 1</title>
    <link rel="stylesheet" href="/static/public.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header-section">
            <div class="header-text">
                <h1>KARUSEI</h1>
                <p class="subtitle">Спасибо, что играете с нами! <span class="heart">♡</span></p>
                <p class="subtitle-small">Ваши победы — наши общие радости</p>
            </div>
        </div>

        <!-- Stats Blocks -->
        <div class="stats-row" id="screen-1">
            <!-- Card 1: Wins 24h (всегда видна) -->
            <div class="stat-card sheep-card">
                <div class="card-header">
                    <div class="icon-circle"><span class="icon">★</span></div>
                    <span class="card-label">ВЫИГРАНО ЗА 24 ЧАСА</span>
                </div>
                <div class="card-content">
                    <div class="stat-value" id="wins24h">—</div>
                </div>
                <div class="splash-container">
                    <div class="splash splash-left-1"></div>
                    <div class="splash splash-left-2"></div>
                    <div class="splash splash-left-3"></div>
                    <div class="splash splash-right-1"></div>
                    <div class="splash splash-right-2"></div>
                    <div class="splash splash-right-3"></div>
                </div>
            </div>

            <!-- Card 2: Last Win (показывается, если есть выигрыш) -->
            <div class="stat-card" id="last-win-card">
                <div class="card-header">
                    <div class="icon-circle"><span class="icon">🏆</span></div>
                    <span class="card-label">ПОСЛЕДНИЙ ВЫИГРЫШ</span>
                </div>
                <div class="card-content">
                    <div class="stat-time" id="lastWinTime">—</div>
                    <div class="stat-detail" id="lastWinMachine"></div>
                </div>
                <div class="splash-container">
                    <div class="splash splash-left-1"></div>
                    <div class="splash splash-left-2"></div>
                    <div class="splash splash-left-3"></div>
                    <div class="splash splash-right-1"></div>
                    <div class="splash splash-right-2"></div>
                    <div class="splash splash-right-3"></div>
                </div>
            </div>
        </div>

        <!-- Screen 2 (Total Wins) -->
        <div class="stats-row" id="screen-2" style="display:none;">
            <div class="stat-card large sheep-card">
                <div class="card-header">
                    <div class="icon-circle"><span class="icon">🎯</span></div>
                    <span class="card-label">ВСЕГО ВЫИГРЫШЕЙ</span>
                </div>
                <div class="card-content">
                    <div class="stat-value" id="totalWins">—</div>
                </div>
                <div class="splash-container">
                    <div class="splash splash-left-1"></div>
                    <div class="splash splash-left-2"></div>
                    <div class="splash splash-left-3"></div>
                    <div class="splash splash-right-1"></div>
                    <div class="splash splash-right-2"></div>
                    <div class="splash splash-right-3"></div>
                </div>
            </div>
        </div>

        <!-- Screen 3 (Jackpot) -->
        <div class="stats-row" id="screen-3" style="display:none;">
            <div class="stat-card large sheep-card">
                <div class="card-header">
                    <div class="icon-circle"><span class="icon">🎁</span></div>
                    <span class="card-label">ОСТАЛОСЬ ДО ГЛАВНОГО ПРИЗА</span>
                </div>
                <div class="card-content">
                    <div class="stat-value" id="jackpotRemaining">—</div>
                    <div class="stat-detail" id="jackpotDetail"></div>
                </div>
                <div class="splash-container">
                    <div class="splash splash-left-1"></div>
                    <div class="splash splash-left-2"></div>
                    <div class="splash splash-left-3"></div>
                    <div class="splash splash-right-1"></div>
                    <div class="splash splash-right-2"></div>
                    <div class="splash splash-right-3"></div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="footer-inner">
                <div class="footer-icon">🎁</div>
                <div class="footer-text">
                    <span class="footer-main">Новые призы каждый день!</span>
                    <span class="footer-sub">Возвращайтесь завтра за новыми победами</span>
                </div>
                <div class="footer-arrow">></div>
            </div>
        </div>
    </div>

    <script>
				// ===== ФИКСАЦИЯ ЭКРАНА ПО URL =====
				// /screen1 → экран 1 (две карточки)
				// /screen2 → экран 2 (одна карточка)
				// /screen3 → экран 3 (одна карточка)
				const urlPath = window.location.pathname;
				let screenNumber = 1;
				if (urlPath.includes('screen2')) screenNumber = 2;
				if (urlPath.includes('screen3')) screenNumber = 3;

				const LOCATION_ID = new URLSearchParams(window.location.search).get('location_id') || '';

				// ===== ОТКЛЮЧАЕМ ПЕРЕКЛЮЧЕНИЕ =====
				function getCurrentScreen() {
						return screenNumber; // Всегда один и тот же экран
				}

				function switchScreen() {
						const n = getCurrentScreen();
						document.getElementById('screen-1').style.display = (n === 1) ? 'flex' : 'none';
						document.getElementById('screen-2').style.display = (n === 2) ? 'flex' : 'none';
						document.getElementById('screen-3').style.display = (n === 3) ? 'flex' : 'none';
				}

				// ===== ЗАГРУЗКА ДАННЫХ =====
				async function fetchData() {
						try {
								const url = '/api/screen-data' + (LOCATION_ID ? '?location_id=' + LOCATION_ID : '');
								const r = await fetch(url);
								const d = await r.json();

								document.getElementById('wins24h').textContent = d.wins_24h;
								
								// Для screen1 управляем второй карточкой
								if (screenNumber === 1) {
										const card = document.getElementById('last-win-card');
										const firstCard = document.querySelector('#screen-1 .stat-card:first-child');
										
										// Проверяем параметр URL для принудительного показа
										const urlParams = new URLSearchParams(window.location.search);
										const forceShow = urlParams.get('show_second') === '1';
										
										if (forceShow) {
												card.style.display = 'flex';
												card.classList.add('sheep-card');
												firstCard.classList.remove('sheep-card');
												firstCard.classList.remove('large');  // Убираем large
												document.getElementById('lastWinTime').textContent = '23:18:37';
												document.getElementById('lastWinMachine').textContent = 'Тестовый выигрыш';
										} else {
												// Скрываем вторую карточку
												card.style.display = 'none';
												card.classList.remove('sheep-card');
												// Овечка на первой карточке
												firstCard.classList.add('sheep-card');
												firstCard.classList.add('large');  // Добавляем класс large
										}
								}

								document.getElementById('totalWins').textContent = d.total_wins;
								const rem = (d.jackpot_threshold || 0) - (d.jackpot_current || 0);
								document.getElementById('jackpotRemaining').textContent = rem > 0 ? rem : 0;
								document.getElementById('jackpotDetail').textContent = `${d.jackpot_current || 0} / ${d.jackpot_threshold || 0}`;
						} catch (e) { console.error(e); }
				}

				// ===== ЗАПУСК =====
				// Показываем нужный экран один раз
				switchScreen();
				// Обновляем данные каждую секунду (без переключения экрана)
				setInterval(fetchData, 1000);
				fetchData();
		</script>
</body>
</html>
