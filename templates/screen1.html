<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARUSEL — Экран 1</title>
    <link rel="stylesheet" href="/static/public.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header-section">
            <div class="header-text">
                <h1>KARUSEI</h1>
                <p class="subtitle">Спасибо, что играете с нами! <span class="heart">♡</span></p>
                <p class="subtitle-small">Ваши победы — наши общие радости</p>
            </div>
        </div>

        <!-- Stats Blocks -->
				<div class="stats-row" id="screen-1">
						<!-- Card 1: Wins 24h (С ОВЕЧКОЙ) -->
						<div class="stat-card sheep-card">
								<div class="card-header">
										<div class="icon-circle"><span class="icon">★</span></div>
										<span class="card-label">ВЫИГРАНО ЗА 24 ЧАСА</span>
								</div>
								<div class="card-content">
										<div class="stat-value" id="wins24h">—</div>
								</div>
								<div class="splash-container">
										<div class="splash splash-left-1"></div>
										<div class="splash splash-left-2"></div>
										<div class="splash splash-left-3"></div>
										<div class="splash splash-right-1"></div>
										<div class="splash splash-right-2"></div>
										<div class="splash splash-right-3"></div>
								</div>
						</div>

						<!-- Card 2: Last Win (без овечки) -->
						<div class="stat-card" id="last-win-card" style="display:none;">
								<div class="card-header">
										<div class="icon-circle"><span class="icon">🏆</span></div>
										<span class="card-label">ПОСЛЕДНИЙ ВЫИГРЫШ</span>
								</div>
								<div class="card-content">
										<div class="stat-time" id="lastWinTime">—</div>
										<div class="stat-detail" id="lastWinMachine"></div>
								</div>
								<div class="splash-container">
										<div class="splash splash-left-1"></div>
										<div class="splash splash-left-2"></div>
										<div class="splash splash-left-3"></div>
										<div class="splash splash-right-1"></div>
										<div class="splash splash-right-2"></div>
										<div class="splash splash-right-3"></div>
								</div>
						</div>
				</div>

        <!-- Screen 2 (Total Wins) -->
        <div class="stats-row" id="screen-2" style="display:none;">
            <!-- Card 1: Total Wins (С ОВЕЧКОЙ) -->
            <div class="stat-card center-card sheep-card">
                <div class="card-header">
                    <div class="icon-circle"><span class="icon">🎯</span></div>
                    <span class="card-label">ВСЕГО ВЫИГРЫШЕЙ</span>
                </div>
                <div class="card-content">
                    <div class="stat-value" id="totalWins">—</div>
                </div>
                <div class="splash-container">
                    <div class="splash splash-left-1"></div>
                    <div class="splash splash-left-2"></div>
                    <div class="splash splash-left-3"></div>
                    <div class="splash splash-right-1"></div>
                    <div class="splash splash-right-2"></div>
                    <div class="splash splash-right-3"></div>
                </div>
            </div>
        </div>

        <!-- Screen 3 (Jackpot) -->
        <div class="stats-row" id="screen-3" style="display:none;">
            <!-- Card 1: Jackpot (С ОВЕЧКОЙ) -->
            <div class="stat-card center-card sheep-card">
                <div class="card-header">
                    <div class="icon-circle"><span class="icon">🎁</span></div>
                    <span class="card-label">ОСТАЛОСЬ ДО ГЛАВНОГО ПРИЗА</span>
                </div>
                <div class="card-content">
                    <div class="stat-value" id="jackpotRemaining">—</div>
                    <div class="stat-detail" id="jackpotDetail"></div>
                </div>
                <div class="splash-container">
                    <div class="splash splash-left-1"></div>
                    <div class="splash splash-left-2"></div>
                    <div class="splash splash-left-3"></div>
                    <div class="splash splash-right-1"></div>
                    <div class="splash splash-right-2"></div>
                    <div class="splash splash-right-3"></div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="footer-inner">
                <div class="footer-icon">🎁</div>
                <div class="footer-text">
                    <span class="footer-main">Новые призы каждый день!</span>
                    <span class="footer-sub">Возвращайтесь завтра за новыми победами</span>
                </div>
                <div class="footer-arrow">></div>
            </div>
        </div>
    </div>

    <script>
        const MONITOR_OFFSET = 0;
        const LOCATION_ID = new URLSearchParams(window.location.search).get('location_id') || '';

        function getCurrentScreen() {
            const segment = Math.floor(new Date().getSeconds() / 20);
            return ((segment + MONITOR_OFFSET) % 3) + 1;
        }

        function switchScreen() {
            const n = getCurrentScreen();
            document.getElementById('screen-1').style.display = (n === 1) ? 'flex' : 'none';
            document.getElementById('screen-2').style.display = (n === 2) ? 'flex' : 'none';
            document.getElementById('screen-3').style.display = (n === 3) ? 'flex' : 'none';
        }

        async function fetchData() {
            try {
                const url = '/api/screen-data' + (LOCATION_ID ? '?location_id=' + LOCATION_ID : '');
                const r = await fetch(url);
                const d = await r.json();

                document.getElementById('wins24h').textContent = d.wins_24h;
                
                const card = document.getElementById('last-win-card');
                if (d.last_win) {
                    const t = new Date(d.last_win.timestamp + 'Z');
                    if ((new Date() - t) / 3600000 <= 2) {
                        document.getElementById('lastWinTime').textContent = t.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
                        document.getElementById('lastWinMachine').textContent = d.last_win.machine_name + ' (' + d.last_win.location_name + ')';
                        card.style.display = '';
                    } else { card.style.display = 'none'; }
                } else { card.style.display = 'none'; }

                document.getElementById('totalWins').textContent = d.total_wins;
                
                const rem = (d.jackpot_threshold || 0) - (d.jackpot_current || 0);
                document.getElementById('jackpotRemaining').textContent = rem > 0 ? rem : 0;
                document.getElementById('jackpotDetail').textContent = `${d.jackpot_current || 0} / ${d.jackpot_threshold || 0}`;
            } catch (e) { console.error(e); }
        }

        setInterval(function() { fetchData(); switchScreen(); }, 1000);
        fetchData(); switchScreen();
    </script>
</body>
</html>
