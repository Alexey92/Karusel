<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARUSEL — Админ-панель</title>
    <link rel="stylesheet" href="/static/admin.css">
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>🔐 KARUSEL</h1>
            <p class="login-subtitle">Админ-панель</p>
            <input type="text" id="username" placeholder="Логин" value="admin">
            <input type="password" id="password" placeholder="Пароль" value="">
            <button id="login-btn" type="button">Войти</button>
            <p id="login-error" class="error"></p>
        </div>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="top-bar">
            <h1>🎰 KARUSEL — Статистика</h1>
            <div class="top-bar-right">
                <span id="current-user"></span>
                <button onclick="doLogout()" class="btn-logout">Выйти</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('overview')">Обзор</button>
            <button class="tab" onclick="showTab('machines')">По аппаратам</button>
            <button class="tab" onclick="showTab('locations')">Адреса</button>
            <button class="tab" onclick="showTab('history')">История</button>
            <button class="tab" onclick="showTab('settings')">Настройки</button>
        </div>

        <!-- Обзор -->
        <div id="tab-overview" class="tab-content active">
            <h2>Все аппараты — сводка</h2>
						
						<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
								<input type="datetime-local" id="date-from" style="padding:6px 10px;border-radius:6px;border:1px solid #444;background:#1a1a2e;color:#fff;">
								<span style="color:#888;">—</span>
								<input type="datetime-local" id="date-to" style="padding:6px 10px;border-radius:6px;border:1px solid #444;background:#1a1a2e;color:#fff;">
								<button onclick="loadOverview()" class="btn-small">Показать</button>
								<span style="color:#888;margin-left:20px;">Стоимость игры:</span>
								<input type="number" id="game-price" value="50" style="width:80px;padding:6px 10px;border-radius:6px;border:1px solid #444;background:#1a1a2e;color:#fff;">
								<span style="color:#888;">₽</span>
						</div>
						
            <div id="overview-cards"></div>
        </div>

        <!-- По аппаратам -->
        <div id="tab-machines" class="tab-content">
            <h2>Детально по аппарату</h2>
            <select id="machine-select" onchange="loadMachineDetail()"><option value="">Выберите аппарат...</option></select>
            <div id="machine-detail"></div>
        </div>

        <!-- Адреса -->
        <div id="tab-locations" class="tab-content">
            <h2>Управление адресами</h2>
            <div class="form-row">
                <input type="text" id="new-location-name" placeholder="Название нового адреса">
                <button onclick="addLocation()" class="btn-small">Добавить адрес</button>
            </div>
            <table class="history-table" style="margin-top:20px;">
                <thead><tr><th>ID</th><th>Название</th><th>Автоматов</th><th>API Key</th><th>Джекпот</th><th>Действия</th></tr></thead>
                <tbody id="locations-body"></tbody>
            </table>
            <div id="location-machines" style="margin-top:20px;"></div>
        </div>

        <!-- История -->
        <div id="tab-history" class="tab-content">
            <h2>Последние события</h2>
            <table class="history-table">
                <thead><tr><th>ID</th><th>Адрес</th><th>Аппарат</th><th>Тип</th><th>Время</th></tr></thead>
                <tbody id="history-body"></tbody>
            </table>
            <div class="pagination">
                <button onclick="loadHistory(0)">⟪ Первая</button>
                <button onclick="loadHistory(currentOffset-50)">⟵ Назад</button>
                <span id="page-info"></span>
                <button onclick="loadHistory(currentOffset+50)">Вперёд ⟶</button>
            </div>
        </div>

        <!-- Настройки -->
        <div id="tab-settings" class="tab-content">
            <h2>Настройки аккаунта</h2>
            <div class="settings-card">
                <h3>🔒 Сменить пароль</h3>
                <div class="form-group"><label>Старый пароль:</label><input type="password" id="old-password" class="form-input"></div>
                <div class="form-group"><label>Новый пароль:</label><input type="password" id="new-password" class="form-input"></div>
                <div class="form-group"><label>Подтвердите новый пароль:</label><input type="password" id="confirm-password" class="form-input"></div>
                <button onclick="changePassword()" class="form-button">Сохранить новый пароль</button>
                <p id="password-message" class="form-message"></p>
            </div>
        </div>
    </div>

    <script>
		const IS_CLOUD = {% if is_cloud %}true{% else %}false{% endif %};
        let token = localStorage.getItem('karusel_token');
        let currentOffset = 0;
        const LIMIT = 50;

        document.addEventListener('DOMContentLoaded',function(){
            document.getElementById('login-btn').addEventListener('click',doLogin);
            init();
        });

        async function init(){
            if(token){
                try{
                    const r = await fetch('/api/admin/check-auth',{headers:{'Authorization':`Bearer ${token}`}});
                    if(r.ok){showDashboard();return;}
                }catch(e){}
                localStorage.removeItem('karusel_token');
                token=null;
            }
            document.getElementById('login-screen').style.display='flex';
        }

        async function doLogin(){
            const u=document.getElementById('username').value,p=document.getElementById('password').value,
                  e=document.getElementById('login-error');
            if(!u||!p){e.textContent='Введите логин и пароль';return;}
            try{
                const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
                if(r.ok){const d=await r.json();token=d.access_token;localStorage.setItem('karusel_token',token);showDashboard();}
                else{const d=await r.json();e.textContent=d.detail||'Ошибка входа';}
            }catch(ex){e.textContent='Сервер недоступен';}
        }

        function doLogout(){
            localStorage.removeItem('karusel_token');token=null;
            document.getElementById('login-screen').style.display='flex';
            document.getElementById('dashboard').style.display='none';
        }

        function showDashboard(){
            document.getElementById('login-screen').style.display='none';
            document.getElementById('dashboard').style.display='block';
            document.getElementById('current-user').textContent='👤 admin';
            loadOverview();loadMachineSelect();
        }

        async function apiGet(url){
            const r=await fetch(url,{headers:{'Authorization':`Bearer ${token}`}});
            if(r.status===401){doLogout();throw new Error('Unauthorized');}
            return r.json();
        }

        function showTab(t){
            document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            if(t==='overview')loadOverview();
            if(t==='machines')loadMachineSelect();
            if(t==='locations')loadLocations();
            if(t==='history')loadHistory(0);
        }

        async function loadOverview() {
					const grid = document.getElementById('overview-cards');
					const from = document.getElementById('date-from')?.value || '';
					const to = document.getElementById('date-to')?.value || '';
					const gamePrice = parseInt(document.getElementById('game-price')?.value || 50);

					// Логика периода
					let fromParam = from ? from.replace('T', ' ') : '';
					let toParam = to ? to.replace('T', ' ') : '';

					if (fromParam && !toParam) {
							const now = new Date();
							toParam = now.getFullYear() + '-' +
									String(now.getMonth() + 1).padStart(2, '0') + '-' +
									String(now.getDate()).padStart(2, '0') + ' ' +
									String(now.getHours()).padStart(2, '0') + ':' +
									String(now.getMinutes()).padStart(2, '0');
					} else if (!fromParam && toParam) {
							fromParam = '2020-01-01 00:00';
					}

					let url = '/api/admin/stats';
					if (fromParam && toParam) {
							url += `?from_date=${fromParam}&to_date=${toParam}`;
					}

					const data = await apiGet(url);
					const locations = await apiGet('/api/admin/locations');

					const jackpotMap = {};
					for (const loc of locations) {
							try {
									const jp = await apiGet('/api/admin/jackpot/' + loc.id);
									jackpotMap[loc.id] = { current: jp.current_win_count, threshold: jp.win_count_for_jackpot };
							} catch (e) {
									jackpotMap[loc.id] = { current: 0, threshold: 0 };
							}
					}

					const grouped = {};
					for (const s of data) {
							const locId = s.location_id || '?';
							if (!grouped[locId]) {
									grouped[locId] = {
											name: s.location_name || 'Адрес #' + locId,
											jackpot: jackpotMap[locId] || { current: 0, threshold: 0 },
											machines: [],
											balanceToday: 0,
											balancePeriod: 0
									};
							}
							grouped[locId].machines.push(s);
					}

					let html = '';
					for (const [locId, g] of Object.entries(grouped)) {
							let locBalanceToday = 0, locBalancePeriod = 0;

							html += `
									<div style="display:flex;align-items:center;gap:16px;margin:20px 0 10px;">
											<h3 style="color:#ffd200;margin:0;">📍 ${g.name}</h3>
											<span style="background:#16213e;padding:6px 14px;border-radius:8px;font-weight:700;color:#ffd200;">
													🎯 Джекпот: ${g.jackpot.current} / ${g.jackpot.threshold}
											</span>
									</div>
							`;
							html += '<div class="cards-grid" style="margin-bottom:10px;">';
							html += g.machines.map(s => {
									const revenueToday = s.plays_today * gamePrice;
									const revenuePeriod = (s.plays_period || 0) * gamePrice;
									locBalanceToday += revenueToday;
									locBalancePeriod += revenuePeriod;
									const avgToyToday = s.wins_today > 0 ? Math.round(revenueToday / s.wins_today) : 0;
									const avgToyPeriod = (s.wins_period || 0) > 0 ? Math.round(revenuePeriod / (s.wins_period || 1)) : 0;

									return `
											<div class="card">
													<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${s.last_seen && (new Date() - new Date(s.last_seen + 'Z')) < 120000 ? '#2ecc71' : '#e74c3c'};margin-right:6px;"></span>
													<div class="card-title">${s.machine_name || 'Автомат №' + s.machine_id} (ID:${s.machine_id})</div>

													<div class="card-section-title">🏆 Выигрыши</div>
													<div class="card-row"><span>За сегодня:</span><strong>${s.wins_today}</strong></div>
													${fromParam && toParam ? `<div class="card-row"><span>За период:</span><strong>${s.wins_period || 0}</strong></div>` : ''}
													<div class="card-row"><span>Последний:</span><small>${s.last_win ? new Date(s.last_win).toLocaleString('ru-RU') : '—'}</small></div>

													<div class="card-section-title">🎮 Игры</div>
													<div class="card-row"><span>За сегодня:</span><strong>${s.plays_today}</strong></div>
													${fromParam && toParam ? `<div class="card-row"><span>За период:</span><strong>${s.plays_period || 0}</strong></div>` : ''}
													<div class="card-row"><span>Последняя:</span><small>${s.last_play ? new Date(s.last_play).toLocaleString('ru-RU') : '—'}</small></div>

													<div class="card-section-title">💰 Доход</div>
													<div class="card-row">
															<span>За сегодня:</span>
															<strong style="color:#2ecc71;font-size:16px;">${revenueToday}₽</strong>
															${avgToyToday > 0 ? ` <small style="color:#888;font-size:15px;">(~${avgToyToday}₽/игрушка)</small>` : ''}
													</div>
													${fromParam && toParam ? `
													<div class="card-row">
															<span>За период:</span>
															<strong style="color:#2ecc71;font-size:16px;">${revenuePeriod}₽</strong>
															${avgToyPeriod > 0 ? ` <small style="color:#888;font-size:15px;">(~${avgToyPeriod}₽/игрушка)</small>` : ''}
													</div>` : ''}
											</div>
									`;
							}).join('');
							html += '</div>';

							// Суммарный баланс по адресу
							html += `
									<div style="background:#16213e;padding:10px 16px;border-radius:8px;margin:0 0 20px;display:flex;gap:20px;">
											<strong style="color:#ffd200;">💰 Баланс адреса:</strong>
											<span>За сегодня: <strong style="color:${locBalanceToday >= 0 ? '#2ecc71' : '#e74c3c'}">${locBalanceToday >= 0 ? '+' : ''}${locBalanceToday}₽</strong></span>
											${fromParam && toParam ? `<span>За период: <strong style="color:${locBalancePeriod >= 0 ? '#2ecc71' : '#e74c3c'}">${locBalancePeriod >= 0 ? '+' : ''}${locBalancePeriod}₽</strong></span>` : ''}
									</div>
							`;
					}
					grid.innerHTML = html || '<p>Нет данных</p>';
			}

        async function loadMachineSelect(){
            const locations = await apiGet('/api/admin/locations');
            const select = document.getElementById('machine-select');
            let html = '<option value="">Выберите аппарат...</option>';
            for(const loc of locations){
                const machines = await apiGet('/api/admin/locations/'+loc.id+'/machines');
                for(const m of machines){
                    html += `<option value="${m.id}">${m.name} (${loc.name})</option>`;
                }
            }
            select.innerHTML = html;
        }

        async function loadMachineDetail(){
            const id = document.getElementById('machine-select').value;
            if(!id) return;
            const stats = await apiGet('/api/admin/stats/'+id);
            document.getElementById('machine-detail').innerHTML = `
							<div class="detail-card">
									<h3>${stats.machine_name || 'Автомат №'+stats.machine_id} (ID:${stats.machine_id})</h3>
									<h4 style="color:#ffd200;margin-top:12px;">🏆 Выигрыши</h4>
									<table>
											<tr><td>За час:</td><td><strong>${stats.wins_hour}</strong></td></tr>
											<tr><td>За сегодня:</td><td><strong>${stats.wins_today}</strong></td></tr>
											<tr><td>За 24ч:</td><td><strong>${stats.wins_24h}</strong></td></tr>
											<tr><td>Всего:</td><td><strong>${stats.wins_total}</strong></td></tr>
											<tr><td>За период:</td><td><strong>${stats.wins_period || 0}</strong></td></tr>
											<tr><td>Последний:</td><td>${stats.last_win ? new Date(stats.last_win).toLocaleString('ru-RU') : '—'}</td></tr>
									</table>
									<h4 style="color:#ffd200;margin-top:12px;">🎮 Игры</h4>
									<table>
											<tr><td>Всего:</td><td><strong>${stats.plays_total||0}</strong></td></tr>
											<tr><td>За период:</td><td><strong>${stats.plays_period || 0}</strong></td></tr>
									</table>
							</div>
					`;
        }

        async function loadLocations(){
            const locations = await apiGet('/api/admin/locations');
            const tbody = document.getElementById('locations-body');
            let html = '';
            for(const l of locations){
                const jp = await apiGet('/api/admin/jackpot/'+l.id);
                html += `
                    <tr>
                        <td>${l.id}</td>
                        <td>${l.name}</td>
                        <td>${l.machine_count}</td>
		       <td><code style="font-size:11px;">${l.api_key || '—'}</code></td>
                        <td>
                            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                                <span style="color:#ffd200;font-weight:700;">${jp.current_win_count}/${jp.win_count_for_jackpot}</span>
                                <input type="number" id="thr-${l.id}" value="${jp.win_count_for_jackpot}" min="1" style="width:70px;">
                                <button onclick="updateThreshold(${l.id})" class="btn-small">✓</button>
                                <button onclick="resetJackpot(${l.id})" class="btn-danger btn-small">Сброс</button>
                            </div>
                        </td>
                        <td>
                            <button onclick="editLocation(${l.id},'${l.name}')">✏️</button>
                            <button onclick="deleteLocation(${l.id})">🗑️</button>
                            <button onclick="showLocationMachines(${l.id})">🔧</button>
                        </td>
                    </tr>`;
            }
            tbody.innerHTML = html;
        }

        async function addLocation(){
            const name = document.getElementById('new-location-name').value;
            if(!name) return;
            await fetch('/api/admin/locations',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({name})});
            document.getElementById('new-location-name').value='';
            loadLocations();
        }

        async function editLocation(id,oldName){
            const name = prompt('Новое название:',oldName);
            if(!name) return;
            await fetch('/api/admin/locations/'+id,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({name})});
            loadLocations();
        }

        async function deleteLocation(id){
            if(!confirm('Удалить адрес и все его автоматы?')) return;
            await fetch('/api/admin/locations/'+id,{method:'DELETE',headers:{'Authorization':`Bearer ${token}`}});
            loadLocations();
        }

        async function showLocationMachines(locId){
						const locations = await apiGet('/api/admin/locations');
						const loc = locations.find(l => l.id == locId);
						const locName = loc ? loc.name : 'Адрес №'+locId;
						
						const machines = await apiGet('/api/admin/locations/'+locId+'/machines');
						let html = `<h3 style="color:#ffd200;margin:0 0 10px;">📍 ${locName} — автоматы</h3>`;
						html += '<table class="history-table"><thead><tr>';
						if (IS_CLOUD) {
							html += '<th>Лок. ID</th>';
						}
						if (!IS_CLOUD) {
								html += '<th>ID</th>';
						}
						html += '<th>Название</th>';
						if (IS_CLOUD) {
							html += '<th>Глоб. ID</th>';
						}
						
						html += '<th></th></tr></thead><tbody>';
						machines.forEach(m=>{
							html += `<tr>`;
							if (IS_CLOUD) {
								html += `<td><input type="number" id="local-${m.id}" value="${m.local_id}" style="width:60px;"></td>`;
							}
							if (!IS_CLOUD) {
									html += `<td>${m.id}</td>`;
							}
							html += `<td><input type="text" id="name-${m.id}" value="${m.name}" style="width:150px;"></td>`;
							if (IS_CLOUD) {
								html += `<td>${m.id}</td>`;
							}
							html += `<td>
								<button onclick="saveMachine(${m.id})" class="btn-small">💾</button>
								<button onclick="deleteMachine(${m.id})" class="btn-danger btn-small">🗑️</button>
							</td></tr>`;
						});
						html += '</tbody></table>';
						html += `<div class="form-row" style="margin-top:10px;">`;
						if (IS_CLOUD) {
							html += `<input type="number" id="new-machine-local" placeholder="Номер на объекте" style="width:100px;">`;
						}
						html += `<input type="text" id="new-machine-name" placeholder="Название автомата">
							<button onclick="addMachine(${locId})">Добавить</button>
						</div>`;
						document.getElementById('location-machines').innerHTML = html;
					}
		
					async function saveMachine(machineId){
						const name = document.getElementById('name-'+machineId).value;
						let body;
						if (IS_CLOUD) {
							const localId = document.getElementById('local-'+machineId).value;
							body = JSON.stringify({local_id:parseInt(localId), name:name});
						} else {
							body = JSON.stringify({name:name});
						}
						await fetch('/api/admin/machines/'+machineId, {
							method:'PUT',
							headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
							body:body
						});
						alert('Сохранено');
					}

        async function addMachine(locId){
						const name = document.getElementById('new-machine-name').value;
						if(!name) return;
						
						let body;
						if (IS_CLOUD) {
							const localId = document.getElementById('new-machine-local').value;
							if(!localId) return;
							body = JSON.stringify({local_id:parseInt(localId), name:name});
						} else {
							body = JSON.stringify({name:name});
						}
						
						await fetch('/api/admin/locations/'+locId+'/machines', {
							method:'POST',
							headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
							body:body
						});
						showLocationMachines(locId); loadLocations();
					}
	

        async function deleteMachine(mId){
            if(!confirm('Удалить автомат?')) return;
            await fetch('/api/admin/machines/'+mId,{method:'DELETE',headers:{'Authorization':`Bearer ${token}`}});
            loadLocations();
        }

        async function loadHistory(offset){
            if(offset<0)offset=0; currentOffset=offset;
            const data = await apiGet(`/api/admin/events?limit=${LIMIT}&offset=${offset}`);
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = data.events.map(e=>`
                <tr>
                    <td>${e.id}</td>
                    <td>${e.location_name}</td>
                    <td>${e.machine_name}</td>
                    <td>${e.event_type==='jackpot'?'🎰 ДЖЕКПОТ':e.event_type==='play'?'🎮 Игра':'🏆 Выигрыш'}</td>
                    <td>${new Date(e.timestamp ).toLocaleString('ru-RU')}</td>
                </tr>
            `).join('');
            const tp = Math.ceil(data.total/LIMIT)||1;
            document.getElementById('page-info').textContent = `Стр. ${Math.floor(offset/LIMIT)+1} из ${tp} (всего ${data.total})`;
        }

        async function updateThreshold(locId){
            const v = document.getElementById('thr-'+locId).value;
            await fetch(`/api/admin/jackpot/${locId}/threshold`,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({win_count:parseInt(v)})});
            loadLocations();
        }

        async function resetJackpot(locId){
            if(!confirm('Сбросить счётчик джекпота?')) return;
            await fetch(`/api/admin/jackpot/${locId}/reset`,{method:'POST',headers:{'Authorization':`Bearer ${token}`}});
            loadLocations();
        }

        async function changePassword(){
            const oldP=document.getElementById('old-password').value,
                  newP=document.getElementById('new-password').value,
                  conf=document.getElementById('confirm-password').value,
                  msg=document.getElementById('password-message');
            if(!oldP||!newP||!conf){msg.innerHTML='<span style="color:#e74c3c;">Заполните все поля</span>';return;}
            if(newP!==conf){msg.innerHTML='<span style="color:#e74c3c;">Пароли не совпадают</span>';return;}
            if(newP.length<4){msg.innerHTML='<span style="color:#e74c3c;">Минимум 4 символа</span>';return;}
            try{
                const r=await fetch('/api/admin/change-password',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({old_password:oldP,new_password:newP})});
                const d=await r.json();
                if(r.ok){msg.innerHTML='<span style="color:#2ecc71;">✅ Пароль изменён!</span>';}
                else{msg.innerHTML=`<span style="color:#e74c3c;">❌ ${d.detail||'Ошибка'}</span>`;}
            }catch(e){msg.innerHTML='<span style="color:#e74c3c;">Сервер недоступен</span>';}
        }
    </script>
</body>
</html>
